<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>止观</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <!-- 允许必要的JavaScript执行 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 - 正确版本 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                 <img src="/assets/icons/logo-optimized.png" alt="止观" class="brand-logo" loading="lazy" width="40" height="40">
                <div class="brand-text">止观</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/pivot'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/leaders'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/account'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
                

            </div>
        </div>
        
        <!-- 主内容区 - UI重构版本 -->
        <div class="main-content">
            <!-- 移动端菜单切换按钮 -->
            <button class="menu-toggle" id="menuToggle">
                <svg class="menu-toggle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 标题 -->
                <h1 class="page-title">JUST WAIT</h1>
                
                <!-- 日期信息 -->
                <div class="date-info">
                    今日判断（等待数据）
                </div>
                

                
                <!-- 核心状态区 -->
                <div class="core-status-section">
                    <!-- 全宽状态按钮 -->
                    <button class="status-button status-red" id="statusButton">
                        <div class="status-text">空仓</div>
                    </button>
                    <!-- 状态说明 -->
                    <div class="status-explanation" id="statusExplanation">
                        等待市场数据...
                    </div>
                </div>
                
                <!-- 波段追踪区 -->
                <div class="wave-tracking-section" id="waveTrackingSection" style="display: none;">
                    <!-- 入场按钮 -->
                    <button class="wave-entry-button" id="waveEntryButton">
                        <span>我要入场</span>
                    </button>
                    
                    <!-- 波段记录卡片 -->
                    <div class="wave-card" id="waveCard" style="display: none;">
                        <div class="wave-card-header">
                            <span class="wave-card-icon">📈</span>
                            <h3 class="wave-card-title">活跃波段</h3>
                        </div>
                        <div class="wave-card-content">
                            <div class="wave-info">
                                <div class="wave-item">
                                    <span class="wave-label">入场日期：</span>
                                    <span class="wave-value" id="waveEntryDate">--</span>
                                </div>
                                <div class="wave-item">
                                    <span class="wave-label">波段类型：</span>
                                    <span class="wave-value" id="waveType">--</span>
                                </div>
                                <div class="wave-item">
                                    <span class="wave-label">持续天数：</span>
                                    <span class="wave-value" id="waveDuration">--</span>
                                </div>
                            </div>
                            <div class="wave-alert" id="waveAlert" style="display: none;">
                                <div class="wave-alert-text">出场条件已触发，考虑离场</div>
                                <div class="wave-action-buttons">
                                    <button class="wave-action-btn wave-exit-btn" id="waveExitBtn">已出场</button>
                                    <button class="wave-action-btn wave-hold-btn" id="waveHoldBtn">继续持有</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 风险指标 -->
                <div class="risk-indicators">
                    <div class="risk-section">
                        <div class="risk-header">
                            <span class="risk-icon">📊</span>
                            <h3 class="risk-title">市场风险指标</h3>
                        </div>
                        <div class="risk-content">
                            <div class="risk-item">
                                <span class="risk-label">短期波动率：</span>
                                <span class="risk-value" id="volatilityValue">--</span>
                                <span class="risk-rating" id="volatilityRating">--</span>
                            </div>
                            <div class="risk-item">
                                <span class="risk-label">趋势稳定性：</span>
                                <span class="risk-value" id="trendValue">--</span>
                                <span class="risk-rating" id="trendRating">--</span>
                            </div>
                            <div class="risk-item">
                                <span class="risk-label">市场宽度(H/L)：</span>
                                <span class="risk-value" id="hlRatioValue">--</span>
                            </div>
                        </div>
                        <div class="risk-desc">基于上证指数10日波动率和趋势分析</div>
                    </div>
                </div>
                

                

            </div>
            

        </div>
    </div>

    <!-- 波段选择模态框 -->
    <div class="wave-modal" id="waveModal" style="display: none;">
        <div class="wave-modal-overlay" id="waveModalOverlay"></div>
        <div class="wave-modal-content">
            <div class="wave-modal-header">
                <h3 class="wave-modal-title">选择波段类型</h3>
                <button class="wave-modal-close" id="waveModalClose">&times;</button>
            </div>
            <div class="wave-modal-body">
                <button class="wave-option" data-type="short">
                    <span class="wave-option-icon">⚡</span>
                    <div class="wave-option-content">
                        <div class="wave-option-title">短波段</div>
                        <div class="wave-option-desc">3-5天，快速进出</div>
                    </div>
                </button>
                <button class="wave-option" data-type="medium">
                    <span class="wave-option-icon">📅</span>
                    <div class="wave-option-content">
                        <div class="wave-option-title">中波段</div>
                        <div class="wave-option-desc">2-4周，趋势跟随</div>
                    </div>
                </button>
                <button class="wave-option" data-type="long">
                    <span class="wave-option-icon">🗓️</span>
                    <div class="wave-option-content">
                        <div class="wave-option-title">长波段</div>
                        <div class="wave-option-desc">1-3月，价值投资</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script src="/src/js/app.js" defer></script>
    
    <script>
        // 波段追踪功能
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Market页面初始化 - 波段追踪');
            
            // 波段数据存储
            let activeWave = null;
            
            // 入场按钮点击
            const waveEntryButton = document.getElementById('waveEntryButton');
            const waveModal = document.getElementById('waveModal');
            const waveModalOverlay = document.getElementById('waveModalOverlay');
            const waveModalClose = document.getElementById('waveModalClose');
            
            if (waveEntryButton) {
                waveEntryButton.addEventListener('click', function() {
                    waveModal.style.display = 'block';
                });
            }
            
            // 关闭模态框
            if (waveModalOverlay) {
                waveModalOverlay.addEventListener('click', closeWaveModal);
            }
            
            if (waveModalClose) {
                waveModalClose.addEventListener('click', closeWaveModal);
            }
            
            // 波段选项点击
            const waveOptions = document.querySelectorAll('.wave-option');
            waveOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const waveType = this.getAttribute('data-type');
                    startNewWave(waveType);
                    closeWaveModal();
                });
            });
            
            // 出场按钮
            const waveExitBtn = document.getElementById('waveExitBtn');
            const waveHoldBtn = document.getElementById('waveHoldBtn');
            
            if (waveExitBtn) {
                waveExitBtn.addEventListener('click', function() {
                    endWave('exited');
                });
            }
            
            if (waveHoldBtn) {
                waveHoldBtn.addEventListener('click', function() {
                    continueWave();
                });
            }
            
            // 加载保存的波段数据
            loadWaveData();
            
            function closeWaveModal() {
                waveModal.style.display = 'none';
            }
            
            function startNewWave(type) {
                const now = new Date();
                const dateStr = now.toLocaleDateString('zh-CN');
                
                activeWave = {
                    type: type,
                    entryDate: dateStr,
                    startTime: now.getTime(),
                    status: 'active'
                };
                
                saveWaveData();
                updateWaveDisplay();
            }
            
            function endWave(action) {
                if (activeWave) {
                    activeWave.status = action === 'exited' ? 'exited' : 'ended';
                    activeWave.endTime = new Date().getTime();
                    saveWaveData();
                    activeWave = null;
                    updateWaveDisplay();
                }
            }
            
            function continueWave() {
                if (activeWave) {
                    const waveCard = document.getElementById('waveCard');
                    const waveAlert = document.getElementById('waveAlert');
                    
                    if (waveCard) waveCard.classList.remove('wave-card-alert');
                    if (waveAlert) waveAlert.style.display = 'none';
                    
                    // 重置出场条件触发状态
                    activeWave.alertTriggered = false;
                    saveWaveData();
                }
            }
            
            function saveWaveData() {
                if (activeWave) {
                    localStorage.setItem('activeWave', JSON.stringify(activeWave));
                } else {
                    localStorage.removeItem('activeWave');
                }
            }
            
            function loadWaveData() {
                const savedWave = localStorage.getItem('activeWave');
                if (savedWave) {
                    try {
                        activeWave = JSON.parse(savedWave);
                        
                        // 检查是否已过期
                        const now = new Date().getTime();
                        const startTime = activeWave.startTime;
                        const daysPassed = Math.floor((now - startTime) / (1000 * 60 * 60 * 24));
                        
                        // 根据波段类型设置最大天数
                        let maxDays = 5; // 短波段默认
                        if (activeWave.type === 'medium') maxDays = 28; // 4周
                        if (activeWave.type === 'long') maxDays = 90; // 3个月
                        
                        if (daysPassed > maxDays) {
                            // 触发出场条件
                            activeWave.alertTriggered = true;
                        }
                        
                        updateWaveDisplay();
                    } catch (e) {
                        console.error('加载波段数据失败:', e);
                        localStorage.removeItem('activeWave');
                    }
                }
            }
            
            function updateWaveDisplay() {
                const waveCard = document.getElementById('waveCard');
                const waveAlert = document.getElementById('waveAlert');
                const waveEntryDate = document.getElementById('waveEntryDate');
                const waveType = document.getElementById('waveType');
                const waveDuration = document.getElementById('waveDuration');
                
                if (activeWave && activeWave.status === 'active') {
                    // 显示波段卡片
                    if (waveCard) waveCard.style.display = 'block';
                    
                    // 更新波段信息
                    if (waveEntryDate) waveEntryDate.textContent = activeWave.entryDate;
                    
                    let typeText = '短波段 (3-5天)';
                    if (activeWave.type === 'medium') typeText = '中波段 (2-4周)';
                    if (activeWave.type === 'long') typeText = '长波段 (1-3月)';
                    if (waveType) waveType.textContent = typeText;
                    
                    // 计算持续天数
                    const now = new Date().getTime();
                    const startTime = activeWave.startTime;
                    const daysPassed = Math.floor((now - startTime) / (1000 * 60 * 60 * 24));
                    if (waveDuration) waveDuration.textContent = `${daysPassed}天`;
                    
                    // 检查是否触发出场条件
                    let maxDays = 5;
                    if (activeWave.type === 'medium') maxDays = 28;
                    if (activeWave.type === 'long') maxDays = 90;
                    
                    if (daysPassed > maxDays || activeWave.alertTriggered) {
                        // 显示出场警告
                        if (waveCard) waveCard.classList.add('wave-card-alert');
                        if (waveAlert) waveAlert.style.display = 'block';
                        activeWave.alertTriggered = true;
                        saveWaveData();
                    } else {
                        if (waveCard) waveCard.classList.remove('wave-card-alert');
                        if (waveAlert) waveAlert.style.display = 'none';
                    }
                } else {
                    // 隐藏波段卡片
                    if (waveCard) waveCard.style.display = 'none';
                    if (waveAlert) waveAlert.style.display = 'none';
                }
            }
            
            // 每秒更新持续天数
            setInterval(updateWaveDisplay, 1000);
        });
    </script>
</body>
</html>
