<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>止观</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <!-- 允许必要的JavaScript执行 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 - 正确版本 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                 <img src="/assets/icons/logo-optimized.png" alt="止观" class="brand-logo" loading="lazy" width="40" height="40">
                <div class="brand-text">止观</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/pivot'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/leaders'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/account'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
                
                <!-- 反馈按钮 -->
                <button class="menu-item feedback-button" onclick="showFeedback()">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 17.5C14.1421 17.5 17.5 14.1421 17.5 10C17.5 5.85786 14.1421 2.5 10 2.5C5.85786 2.5 2.5 5.85786 2.5 10C2.5 11.422 2.915 12.75 3.634 13.865L2.5 17.5L6.135 16.366C7.25 17.085 8.578 17.5 10 17.5Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>反馈</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - UI重构版本 -->
        <div class="main-content">
            <!-- 移动端菜单切换按钮 -->
            <button class="menu-toggle" id="menuToggle">
                <svg class="menu-toggle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 标题 -->
                <h1 class="page-title">JUST WAIT</h1>
                
                <!-- 日期信息 -->
                <div class="date-info">
                    今日判断（等待数据）
                </div>
                

                
                <!-- 状态区 -->
            <div class="status-section">
                <p class="position-info">建议仓位：0%</p>
                <div class="loading-indicator">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            </div>
                
                <!-- 行动按钮 -->
                <button class="action-button action-loading" id="tradeButton">获取市场数据</button>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 三个状态说明 -->
                <div class="states-explanation">
                    <div class="state-section" id="state-0">
                        <div class="state-header">
                            <span class="state-indicator state-red"></span>
                            <h3 class="state-title">状态：无交易优势</h3>
                            <button class="copy-btn" onclick="copyStateText(0)">复制</button>
                        </div>
                        <div class="state-content">
                            <p><strong>说明：</strong><br>当前未出现可执行结构，价格仍处于随机波动</p>
                            <p><strong>建议：</strong><br>不出手，保持空仓</p>
                            <p><strong>底层逻辑：</strong><br>价格尚未完成自我证明</p>
                        </div>
                    </div>
                    
                    <div class="state-section" id="state-1">
                        <div class="state-header">
                            <span class="state-indicator state-yellow"></span>
                            <h3 class="state-title">状态：观察中</h3>
                            <button class="copy-btn" onclick="copyStateText(1)">复制</button>
                        </div>
                        <div class="state-content">
                            <p><strong>说明：</strong><br>部分标的接近关键位置，但尚未形成确认</p>
                            <p><strong>建议：</strong><br>记录候选，等待突破或回踩确认</p>
                            <p><strong>底层逻辑：</strong><br>接近机会 ≠ 机会</p>
                        </div>
                    </div>
                    
                    <div class="state-section" id="state-2">
                        <div class="state-header">
                            <span class="state-indicator state-green"></span>
                            <h3 class="state-title">状态：可尝试</h3>
                            <button class="copy-btn" onclick="copyStateText(2)">复制</button>
                        </div>
                        <div class="state-content">
                            <p><strong>说明：</strong><br>结构已被市场确认，具备试错条件</p>
                            <p><strong>建议：</strong><br>1/9仓位试仓，严格执行止损</p>
                            <p><strong>底层逻辑：</strong><br>只有被验证的走势才值得参与</p>
                        </div>
                    </div>
                </div>
                

            </div>
            

        </div>
    </div>

    <script src="/src/js/app.js" defer></script>
</body>
</html>
