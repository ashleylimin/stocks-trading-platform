<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 - 正确版本 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                 <img src="assets/icons/logo.png" alt="止观" class="brand-logo">
                <div class="brand-text">止观 [TEST]</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - UI重构版本 -->
        <div class="main-content">
            <!-- 顶部标题 -->
            <div class="page-header">
                <h1 class="page-title">JUST WAIT [TEST]</h1>
            </div>
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 状态区 -->
            <div class="status-section">
                <p class="position-info">正在获取市场数据</p>
                <div class="loading-indicator">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            </div>
                
                <!-- 行动按钮 -->
                <button class="action-button action-red">今日禁止交易</button>
                
                <!-- 实际决策依据 -->
                <div class="decision-basis">
                    <div class="basis-title">决策依据</div>
                    <div class="basis-item">
                        <span class="basis-label">市场广度：</span>
                        <span class="basis-value">上涨23.4% / 下跌76.6%</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">52周高低比：</span>
                        <span class="basis-value">21.8% (292/1340)</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">趋势条件：</span>
                        <span class="basis-value basis-false">未满足</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">广度条件：</span>
                        <span class="basis-value basis-false">未满足</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">板块条件：</span>
                        <span class="basis-value basis-true">已满足</span>
                    </div>
                </div>
                

            </div>
            

        </div>
    </div>

    <script src="/src/js/app.js" defer></script>
</body>
</html>
