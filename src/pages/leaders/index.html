    <script>
        // 从后端API获取筛选后的Leaders数据
        async function fetchFilteredLeaders() {
            try {
                console.log('正在获取筛选后的Leaders数据...');
                
                const apiUrl = 'https://stocks-trading-platform-production.up.railway.app/api/leaders/filtered?t=' + Date.now();
                console.log('API URL:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                console.log('响应状态:', response.status, response.statusText);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('API响应:', result);
                
                if (result.success && result.data) {
                    updateLeadersUI(result.data);
                    console.log('Leaders数据更新完成');
                    console.log('筛选条件:', result.criteria);
                } else {
                    console.log('API响应格式错误，使用示例数据');
                    useExampleData();
                }
            } catch (error) {
                console.error('获取Leaders数据失败:', error);
                console.log('使用示例数据');
                useExampleData();
            }
        }
        
        // 更新UI显示筛选后的Leaders
        function updateLeadersUI(stocks) {
            const leadersList = document.querySelector('.leaders-list');
            if (!leadersList) return;
            
            // 清空现有列表
            leadersList.innerHTML = '';
            
            // 统计乖离过大的股票数量
            let biasExceedCount = 0;
            
            // 添加筛选后的股票（集成乖离防御塔逻辑）
            stocks.forEach(stock => {
                const leaderItem = document.createElement('div');
                leaderItem.className = 'leader-item';
                
                // 使用后端API返回的真实数据
                const currentPrice = stock.current_price || 100;
                const ma20 = stock.ma20 || currentPrice * 0.95; // 使用API返回的ma20或默认值
                const bias20 = stock.bias20 || ((currentPrice - ma20) / ma20) * 100; // 优先使用API返回的bias20
                
                // 判断是否乖离过大（>= 15%）
                const isBiasExceed = bias20 >= 15;
                if (isBiasExceed) {
                    biasExceedCount++;
                }
                
                // 使用后端API返回的真实MA5和near_high数据
                const ma5 = stock.ma5 || currentPrice * 0.98; // 使用API返回的ma5或默认值
                const nearHigh = stock.near_high || false; // 使用API返回的near_high或默认值
                const priceToHighRatio = stock.price_to_high_ratio || 0.95;
                
                // 判断Pivot状态
                let pivotStatus = '';
                if (currentPrice >= ma5 && (nearHigh || priceToHighRatio > 0.95)) {
                    pivotStatus = 'Near Pivot';
                } else if (currentPrice < ma5) {
                    pivotStatus = 'Pivot Failure';
                }
                
                // 生成状态标签HTML（应用乖离防御塔和Pivot判断逻辑）
                let statusTagsHTML = '';
                if (isBiasExceed) {
                    // 乖离过大：强制替换为深灰色背景的[乖离过大]标签
                    statusTagsHTML = '<span class="status-tag status-bias-exceed">乖离过大</span>';
                    
                    // 添加悬浮提示
                    leaderItem.title = "当前偏离均线重心太高（橡皮筋崩紧），禁止追高，守护 1/9 试错机会。";
                    
                    // 应用交互拦截样式
                    leaderItem.style.pointerEvents = 'none';
                    leaderItem.style.opacity = '0.6';
                    leaderItem.style.cursor = 'not-allowed';
                } else {
                    // 正常状态：根据Pivot判断和原有标签生成状态
                    const originalTags = stock.status_tags || [];
                    let finalTags = [...originalTags];
                    
                    // 添加Pivot状态标签
                    if (pivotStatus === 'Near Pivot') {
                        // 如果已经有"接近 Pivot"标签，保持它，否则添加
                        if (!originalTags.includes('接近 Pivot')) {
                            finalTags.push('接近 Pivot');
                        }
                    } else if (pivotStatus === 'Pivot Failure') {
                        // 添加Pivot Failure标签（新标签）
                        finalTags.push('Pivot Failure');
                    }
                    
                    // 生成HTML
                    statusTagsHTML = finalTags.map(tag => {
                        let statusClass = 'status-watch';
                        if (tag === '强势') statusClass = 'status-strong';
                        if (tag === '接近 Pivot') statusClass = 'status-pivot';
                        if (tag === 'Pivot Failure') statusClass = 'status-failure';
                        return `<span class="status-tag ${statusClass}">${tag}</span>`;
                    }).join('');
                }
                
                // 添加bias20信息到股票名称（调试用）
                const biasInfo = isBiasExceed ? 
                    ` (bias20: ${bias20.toFixed(1)}% ⚠️)` : 
                    ` (bias20: ${bias20.toFixed(1)}%)`;
                
                leaderItem.innerHTML = `
                    <div class="stock-info">
                        <div class="stock-name">${stock.name}${biasInfo}</div>
                        <div class="stock-status">
                            ${statusTagsHTML}
                        </div>
                    </div>
                `;
                
                // 添加数据属性以便后续更新
                leaderItem.dataset.bias20 = bias20.toFixed(1);
                leaderItem.dataset.currentPrice = currentPrice;
                leaderItem.dataset.ma20 = ma20.toFixed(2);
                
                leadersList.appendChild(leaderItem);
            });
            
            // 更新状态信息
            document.querySelector('.loading-indicator').style.display = 'none';
            document.querySelector('.position-info').textContent = `黑马筛选 · 符合条件: ${stocks.length}只 · 乖离过大: ${biasExceedCount}只`;
            
            console.log('筛选逻辑（黑马筛选器）：');
            console.log('1. 【防象栅栏】市值50-400亿（400亿上限，彻底屏蔽宁德时代、贵州茅台等迟钝大象）');
            console.log('2. 【短期铁闸】必须站稳10日线（连10日线都跌破的破位股直接剔除）');
            console.log('3. 【中期底线】大趋势必须向上（价格 > 50日均线）');
            console.log('4. 【蓄势要求】距离近20天最高点的回撤不得超过15%（确保资金未大幅出逃）');
            console.log('5. 【防妖股】近20日涨幅如果超过30%，说明已经飞天透支，不作为首选');
            console.log('6. 【允许潜伏】下限放宽到-10%，允许筛选出正在"缩量横盘装死"的绝佳枢纽点标的');
            console.log('7. 【活水门槛】今日成交额 > 5亿，保证试错子弹进出流畅，不会被量化秒砸');
            console.log('8. 【核心引擎】换手率降序！找出当前盘面中最躁动、最受资金关注的核心标的');
            console.log('9. 【扩大视野】取前20名，交由用户的肉眼进行最终的"图形整齐度"审美过滤');
            console.log('10.【乖离防御塔】bias20 >= 15% 时标记为[乖离过大]并禁用交互');
            
            // 启动定期检查bias20变化（模拟实时更新）
            startBiasMonitoring();
        }
        
        // 启动bias20监控（模拟实时更新）
        function startBiasMonitoring() {
            console.log('启动乖离防御塔监控...');
            
            // 每30秒检查一次bias20变化（模拟实时更新）
            setInterval(() => {
                const leaderItems = document.querySelectorAll('.leader-item');
                leaderItems.forEach(item => {
                    const bias20 = parseFloat(item.dataset.bias20);
                    const currentPrice = parseFloat(item.dataset.currentPrice);
                    
                    // 模拟价格波动（实际应从后端获取实时数据）
                    const priceChange = (Math.random() - 0.5) * 0.02; // ±1%波动
                    const newPrice = currentPrice * (1 + priceChange);
                    
                    // 模拟ma20变化（比价格变化慢）
                    const ma20 = parseFloat(item.dataset.ma20);
                    const ma20Change = priceChange * 0.5; // ma20变化是价格变化的一半
                    const newMa20 = ma20 * (1 + ma20Change);
                    
                    // 计算新的bias20
                    const newBias20 = ((newPrice - newMa20) / newMa20) * 100;
                    
                    // 更新数据属性
                    item.dataset.bias20 = newBias20.toFixed(1);
                    item.dataset.currentPrice = newPrice.toFixed(2);
                    item.dataset.ma20 = newMa20.toFixed(2);
                    
                    // 检查是否需要更新状态
                    const wasBiasExceed = bias20 >= 15;
                    const isBiasExceed = newBias20 >= 15;
                    
                    if (wasBiasExceed !== isBiasExceed) {
                        console.log(`检测到bias20变化: ${bias20.toFixed(1)}% -> ${newBias20.toFixed(1)}%，更新状态...`);
                        updateBiasStatus(item, newBias20, newPrice, newMa20);
                    }
                });
            }, 30000); // 30秒检查一次
            
            console.log('乖离防御塔监控已启动，每30秒检查一次bias20变化');
        }
        
        // 更新bias20状态
        function updateBiasStatus(item, bias20, currentPrice, ma20) {
            const isBiasExceed = bias20 >= 15;
            const stockName = item.querySelector('.stock-name').textContent.split(' (')[0]; // 移除bias信息
            
            // 更新股票名称显示
            const biasInfo = isBiasExceed ? 
                ` (bias20: ${bias20.toFixed(1)}% ⚠️)` : 
                ` (bias20: ${bias20.toFixed(1)}%)`;
            item.querySelector('.stock-name').textContent = stockName + biasInfo;
            
            // 更新状态标签
            const stockStatus = item.querySelector('.stock-status');
            if (isBiasExceed) {
                // 乖离过大：强制替换为深灰色背景的[乖离过大]标签
                stockStatus.innerHTML = '<span class="status-tag status-bias-exceed">乖离过大</span>';
                
                // 添加悬浮提示
                item.title = "当前偏离均线重心太高（橡皮筋崩紧），禁止追高，守护 1/9 试错机会。";
                
                // 应用交互拦截样式
                item.style.pointerEvents = 'none';
                item.style.opacity = '0.6';
                item.style.cursor = 'not-allowed';
                
                console.log(`🚨 ${stockName}: bias20=${bias20.toFixed(1)}% >= 15%，标记为[乖离过大]`);
            } else {
                // 恢复正常状态（这里需要从原始数据获取原有标签，暂时显示"正常"）
                stockStatus.innerHTML = '<span class="status-tag status-strong">强势</span>';
                
                // 移除悬浮提示
                item.title = '';
                
                // 恢复交互权限
                item.style.pointerEvents = '';
                item.style.opacity = '';
                item.style.cursor = '';
                
                console.log(`✅ ${stockName}: bias20=${bias20.toFixed(1)}% < 15%，恢复正常状态`);
            }
        }

            const exampleStocks = [
                {
                    name: "新易盛",

                    bias20: 6.46
                },
                {
                    name: "歌尔股份",
                    current_price: 24.85,
                    status_tags: ["观察"],
                    ma5: 24.4,
                    ma10: 24.13,
                    ma20: 23.5,

                },
                {
                    name: "亿纬锂能",

                },
                {

                }
            ];
            
            updateLeadersUI(exampleStocks);
        }
            ];
            
            updateLeadersUI(exampleStocks);
        }
        
        // 页面加载时获取数据
        fetchFilteredLeaders();
        
        // 移动端菜单切换功能
        initMobileMenu();
        
        function initMobileMenu() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('mobile-visible');
                    
                    // 切换菜单图标
                    const icon = menuToggle.querySelector('.menu-toggle-icon');
                    if (sidebar.classList.contains('mobile-visible')) {
                        // 显示关闭图标
                        icon.innerHTML = '<path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    } else {
                        // 显示汉堡菜单图标
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏外部关闭菜单
                document.addEventListener('click', function(event) {
                    if (sidebar.classList.contains('mobile-visible') && 
                        !sidebar.contains(event.target) && 
                        !menuToggle.contains(event.target)) {
                        sidebar.classList.remove('mobile-visible');
                        const icon = menuToggle.querySelector('.menu-toggle-icon');
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏菜单项后关闭菜单（移动端）
                const menuItems = sidebar.querySelectorAll('.menu-item');
                menuItems.forEach(item => {
                    item.addEventListener('click', function() {
                        if (window.innerWidth <= 768) {
                            sidebar.classList.remove('mobile-visible');
                            const icon = menuToggle.querySelector('.menu-toggle-icon');
                            icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                        }
                    });
                });
                
                console.log('移动端菜单切换功能已启用');
            }
        }
        
        // 反馈功能
        function showFeedback() {

            if (feedbackText && feedbackText.trim()) {
                alert('感谢您的反馈！\n\n您的意见对我们非常重要。\n\n反馈已记录，我们会持续改进系统。');
                console.log('用户反馈:', feedbackText);
                
                // 这里可以添加将反馈发送到后端的代码
                // sendFeedbackToBackend(feedbackText);
            } else if (feedbackText !== null) {
                alert('反馈内容不能为空。');
            }
        }
        
        // 添加反馈按钮事件监听
        const feedbackButton = document.querySelector('.feedback-button');
        if (feedbackButton) {
            feedbackButton.addEventListener('click', showFeedback);
        }
    </script>
