<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观 - Leaders</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <img src="/assets/icons/logo-optimized.png" alt="止观" class="brand-logo">
                <div class="brand-text">止观</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item" onclick="window.location.href='/market'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/pivot'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/account'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - 只盯最强股票 -->
        <div class="main-content">
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 标题 -->
                <h1 class="page-title">LEADERS</h1>
                
                <!-- 副标题 -->
                <div class="subtitle-section">
                    <div class="subtitle-text">只盯最强股票</div>
                </div>
                
                <!-- 状态区 -->
                <div class="status-section">
                    <p class="position-info">正在筛选最强股票</p>
                    <div class="loading-indicator">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 股票列表（最多5个） -->
                <div class="leaders-list">
                    <div class="leader-item">
                        <div class="stock-info">
                            <div class="stock-name">宁德时代</div>
                            <div class="stock-status">
                                <span class="status-tag status-strong">强势</span>
                                <span class="status-tag status-pivot">接近 Pivot</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="leader-item">
                        <div class="stock-info">
                            <div class="stock-name">贵州茅台</div>
                            <div class="stock-status">
                                <span class="status-tag status-strong">强势</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="leader-item">
                        <div class="stock-info">
                            <div class="stock-name">中际旭创</div>
                            <div class="stock-status">
                                <span class="status-tag status-watch">观察</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="leader-item">
                        <div class="stock-info">
                            <div class="stock-name">药明康德</div>
                            <div class="stock-status">
                                <span class="status-tag status-watch">观察</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="leader-item">
                        <div class="stock-info">
                            <div class="stock-name">中国中免</div>
                            <div class="stock-status">
                                <span class="status-tag status-watch">观察</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 页面底部规则 -->
                <div class="rules-section">
                    <div class="rules-title">规则：</div>
                    <div class="rules-content">
                        <div class="rule-item">只从这里选</div>
                        <div class="rule-item">不在名单，不交易</div>
                        <div class="rule-item">只做「强势 + 接近 Pivot」</div>
                        <div class="rule-item">其他全部忽略</div>
                    </div>
                </div>
                
            </div>
            
        </div>
    </div>
    
    <script>
        // 从后端API获取筛选后的Leaders数据
        async function fetchFilteredLeaders() {
            try {
                console.log('正在获取筛选后的Leaders数据...');
                
                const apiUrl = 'https://stocks-trading-platform-production.up.railway.app/api/leaders/filtered';
                console.log('API URL:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                console.log('响应状态:', response.status, response.statusText);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('API响应:', result);
                
                if (result.success && result.data) {
                    updateLeadersUI(result.data);
                    console.log('Leaders数据更新完成');
                    console.log('筛选条件:', result.criteria);
                } else {
                    console.log('API响应格式错误，使用示例数据');
                    useExampleData();
                }
            } catch (error) {
                console.error('获取Leaders数据失败:', error);
                console.log('使用示例数据');
                useExampleData();
            }
        }
        
        // 更新UI显示筛选后的Leaders
        function updateLeadersUI(stocks) {
            const leadersList = document.querySelector('.leaders-list');
            if (!leadersList) return;
            
            // 清空现有列表
            leadersList.innerHTML = '';
            
            // 添加筛选后的股票
            stocks.forEach(stock => {
                const leaderItem = document.createElement('div');
                leaderItem.className = 'leader-item';
                
                const statusTagsHTML = stock.status_tags.map(tag => {
                    let statusClass = 'status-watch';
                    if (tag === '强势') statusClass = 'status-strong';
                    if (tag === '接近 Pivot') statusClass = 'status-pivot';
                    return `<span class="status-tag ${statusClass}">${tag}</span>`;
                }).join('');
                
                leaderItem.innerHTML = `
                    <div class="stock-info">
                        <div class="stock-name">${stock.name}</div>
                        <div class="stock-status">
                            ${statusTagsHTML}
                        </div>
                    </div>
                `;
                
                leadersList.appendChild(leaderItem);
            });
            
            // 更新状态信息
            document.querySelector('.loading-indicator').style.display = 'none';
            document.querySelector('.position-info').textContent = `筛选完成 · 符合条件: ${stocks.length}只`;
            
            console.log('筛选逻辑：');
            console.log('1. 近20日涨幅 > 15%');
            console.log('2. 当前价格 > 50日均线');
            console.log('3. 当前价格 / 20日高点 > 0.9');
            console.log('4. 成交额 > 5亿');
            console.log('5. 市值 < 3000亿');
            console.log('6. 排序：20日涨幅降序');
            console.log('7. 取前5');
        }
        
        // 使用示例数据（fallback）
        function useExampleData() {
            const exampleStocks = [
                {
                    name: "宁德时代",
                    status_tags: ["强势", "接近 Pivot"]
                },
                {
                    name: "贵州茅台",
                    status_tags: ["强势"]
                },
                {
                    name: "中际旭创",
                    status_tags: ["观察"]
                },
                {
                    name: "药明康德",
                    status_tags: ["观察"]
                },
                {
                    name: "中国中免",
                    status_tags: ["观察"]
                }
            ];
            
            updateLeadersUI(exampleStocks);
        }
        
        // 页面加载时获取数据
        fetchFilteredLeaders();
    </script>
</body>
</html>
