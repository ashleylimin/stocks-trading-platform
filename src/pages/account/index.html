<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>止观 - Account</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <!-- 允许必要的JavaScript执行 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                 <img src="/assets/icons/logo-optimized.png" alt="止观" class="brand-logo" loading="lazy" width="40" height="40">
                <div class="brand-text">止观</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item" onclick="window.location.href='/market'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/pivot'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/leaders'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
                
                <!-- 反馈按钮 -->
                <button class="menu-item feedback-button" onclick="showFeedback()">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 17.5C14.1421 17.5 17.5 14.1421 17.5 10C17.5 5.85786 14.1421 2.5 10 2.5C5.85786 2.5 2.5 5.85786 2.5 10C2.5 11.422 2.915 12.75 3.634 13.865L2.5 17.5L6.135 16.366C7.25 17.085 8.578 17.5 10 17.5Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>反馈</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - 纪律检查页面 -->
        <div class="main-content">
            <!-- 移动端菜单切换按钮 -->
            <button class="menu-toggle" id="menuToggle">
                <svg class="menu-toggle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 标题 -->
                <h1 class="page-title">ACCOUNT</h1>
                
                <!-- 状态区 -->
                <div class="status-section">
                    <p class="position-info">纪律检查系统</p>
                    <div class="loading-indicator">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 仓位管理概览 -->
                <div class="position-overview">
                    <div class="overview-title">仓位管理概览</div>
                    
                    <!-- 底仓概览 -->
                    <div class="overview-item stone-overview">
                        <div class="overview-header">
                            <span class="overview-icon">🪨</span>
                            <div class="overview-info">
                                <div class="overview-name">底仓 (Stone)</div>
                                <div class="overview-value">当前：--%</div>
                            </div>
                        </div>
                        <div class="overview-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 20%; background: linear-gradient(90deg, #8b5cf6, #a78bfa);"></div>
                            </div>
                            <div class="progress-label">熬冬进度：20%</div>
                        </div>
                    </div>
                    
                    <!-- 刺刀概览 -->
                    <div class="overview-item bayonet-overview">
                        <div class="overview-header">
                            <span class="overview-icon">⚔️</span>
                            <div class="overview-info">
                                <div class="overview-name">刺刀 (Bayonet)</div>
                                <div class="overview-value">当前：--%</div>
                            </div>
                        </div>
                        <div class="overview-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 95%; background: linear-gradient(90deg, #10b981, #34d399);"></div>
                            </div>
                            <div class="progress-label">离死亡线：5%</div>
                        </div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 建议仓位（只读） -->
                <div class="suggested-section">
                    <div class="suggested-title">建议仓位</div>
                    <div class="suggested-value" id="suggestedPosition">0%</div>
                    <div class="suggested-note">（来自 Market 页面）</div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 关键对比 -->
                <div class="comparison-section">
                    <div class="comparison-item">
                        <div class="comparison-label">当前仓位：</div>
                        <div class="comparison-value" id="displayCurrentPosition">--</div>
                    </div>
                    <div class="comparison-item">
                        <div class="comparison-label">建议仓位：</div>
                        <div class="comparison-value" id="displaySuggestedPosition">0%</div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 账户状态 -->
                <div class="account-status-section">
                    <div class="status-label">账户状态：</div>
                    <div class="status-value" id="accountStatus">--</div>
                </div>
                
                <!-- 操作建议 -->
                <div class="action-suggestion-section">
                    <div class="suggestion-label">操作建议：</div>
                    <div class="suggestion-text" id="actionSuggestion">请输入当前仓位</div>
                </div>
                
            </div>
            
        </div>
    </div>
    
    <script>
        // 纪律检查系统
        let suggestedPosition = 0; // 默认建议仓位，应从Market页面获取
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 隐藏加载指示器
            document.querySelector('.loading-indicator').style.display = 'none';
            document.querySelector('.position-info').textContent = '纪律检查系统就绪';
            
            // 设置建议仓位（这里应该从Market页面获取，暂时使用默认值）
            updateSuggestedPosition();
            
            // 添加快捷按钮事件
            document.querySelectorAll('.quick-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const value = this.getAttribute('data-value');
                    document.getElementById('currentPosition').value = value;
                    checkDiscipline();
                });
            });
            
            // 添加输入框事件
            const input = document.getElementById('currentPosition');
            input.addEventListener('input', checkDiscipline);
            input.addEventListener('change', checkDiscipline);
            
            // 初始检查
            checkDiscipline();
        });
        
        // 更新建议仓位（应从Market页面API获取）
        function updateSuggestedPosition() {
            // 这里应该调用Market页面的API获取建议仓位
            // 暂时使用示例值：0%（禁止交易）、30%（可以交易）、60%（积极做多）
            suggestedPosition = 0; // 默认禁止交易
            
            // 更新显示
            document.getElementById('suggestedPosition').textContent = suggestedPosition + '%';
            document.getElementById('displaySuggestedPosition').textContent = suggestedPosition + '%';
        }
        
        // 纪律检查核心逻辑
        function checkDiscipline() {
            const currentPositionInput = document.getElementById('currentPosition');
            const currentPosition = parseFloat(currentPositionInput.value) || 0;
            
            // 更新显示
            document.getElementById('displayCurrentPosition').textContent = currentPosition + '%';
            
            // 计算差值
            const difference = currentPosition - suggestedPosition;
            
            // 确定状态
            let status = 'normal';
            let statusText = '正常';
            let statusClass = 'status-normal';
            let suggestionText = '允许持有<br>仅在信号出现时加仓';
            
            if (currentPosition > suggestedPosition) {
                if (difference <= 30) {
                    status = 'deviate';
                    statusText = '偏离';
                    statusClass = 'status-deviate';
                    suggestionText = '停止加仓<br>等待信号确认';
                } else {
                    status = 'violation';
                    statusText = '违规';
                    statusClass = 'status-violation';
                    suggestionText = '减仓<br>避免扩大损失';
                }
            }
            
            // 更新状态显示
            const statusElement = document.getElementById('accountStatus');
            statusElement.textContent = statusText;
            statusElement.className = 'status-value ' + statusClass;
            
            // 更新操作建议
            document.getElementById('actionSuggestion').innerHTML = suggestionText;
            
            // 更新快捷按钮状态
            document.querySelectorAll('.quick-btn').forEach(button => {
                const value = parseFloat(button.getAttribute('data-value'));
                if (value === currentPosition) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
            
            // 记录检查结果
            console.log('纪律检查结果：');
            console.log(`当前仓位: ${currentPosition}%`);
            console.log(`建议仓位: ${suggestedPosition}%`);
            console.log(`差值: ${difference}%`);
            console.log(`状态: ${statusText}`);
            console.log(`操作建议: ${suggestionText.replace('<br>', ' ')}`);
        }
        
        // 模拟从Market页面获取建议仓位
        function fetchSuggestedPositionFromMarket() {
            // 这里应该调用Market页面的API
            // 示例：fetch('/api/market/suggested-position').then(...)
            
            // 暂时返回示例值
            return new Promise(resolve => {
                setTimeout(() => {
                    // 模拟三种状态：0%（禁止交易）、30%（可以交易）、60%（积极做多）
                    const states = [0, 30, 60];
                    const randomState = states[Math.floor(Math.random() * states.length)];
                    resolve(randomState);
                }, 500);
            });
        }
        
        // 如果需要从Market页面动态获取建议仓位，可以调用这个函数
        async function updateSuggestedPositionFromAPI() {
            try {
                const position = await fetchSuggestedPositionFromMarket();
                suggestedPosition = position;
                updateSuggestedPosition();
                checkDiscipline();
            } catch (error) {
                console.error('获取建议仓位失败:', error);
            }
        }
        
        // 页面加载时可以从API获取建议仓位（取消注释以下行）
        // updateSuggestedPositionFromAPI();
        
        // 移动端菜单切换功能
        initMobileMenu();
        
        function initMobileMenu() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('mobile-visible');
                    
                    // 切换菜单图标
                    const icon = menuToggle.querySelector('.menu-toggle-icon');
                    if (sidebar.classList.contains('mobile-visible')) {
                        // 显示关闭图标
                        icon.innerHTML = '<path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    } else {
                        // 显示汉堡菜单图标
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏外部关闭菜单
                document.addEventListener('click', function(event) {
                    if (sidebar.classList.contains('mobile-visible') && 
                        !sidebar.contains(event.target) && 
                        !menuToggle.contains(event.target)) {
                        sidebar.classList.remove('mobile-visible');
                        const icon = menuToggle.querySelector('.menu-toggle-icon');
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏菜单项后关闭菜单（移动端）
                const menuItems = sidebar.querySelectorAll('.menu-item');
                menuItems.forEach(item => {
                    item.addEventListener('click', function() {
                        if (window.innerWidth <= 768) {
                            sidebar.classList.remove('mobile-visible');
                            const icon = menuToggle.querySelector('.menu-toggle-icon');
                            icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                        }
                    });
                });
                
                console.log('移动端菜单切换功能已启用');
            }
        }
        
        // 反馈功能
        function showFeedback() {
            const feedbackText = prompt('感谢使用止观系统！\n\n请告诉我们您的反馈或建议：\n\n1. 系统是否帮助您减少了不必要的交易？\n2. 您希望看到哪些改进？\n3. 其他建议？', '');
            
            if (feedbackText && feedbackText.trim()) {
                alert('感谢您的反馈！\n\n您的意见对我们非常重要。\n\n反馈已记录，我们会持续改进系统。');
                console.log('用户反馈:', feedbackText);
                
                // 这里可以添加将反馈发送到后端的代码
                // sendFeedbackToBackend(feedbackText);
            } else if (feedbackText !== null) {
                alert('反馈内容不能为空。');
            }
        }
        
        // 添加反馈按钮事件监听
        const feedbackButton = document.querySelector('.feedback-button');
        if (feedbackButton) {
            feedbackButton.addEventListener('click', showFeedback);
        }
    </script>
</body>
</html>
