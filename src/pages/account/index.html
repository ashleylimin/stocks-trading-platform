<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观 - Account</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <img src="/assets/icons/logo-optimized.png" alt="止观" class="brand-logo">
                <div class="brand-text">止观</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item" onclick="window.location.href='/market'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/pivot'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/leaders'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - 纪律检查页面 -->
        <div class="main-content">
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 标题 -->
                <h1 class="page-title">ACCOUNT</h1>
                
                <!-- 状态区 -->
                <div class="status-section">
                    <p class="position-info">纪律检查系统</p>
                    <div class="loading-indicator">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 当前仓位输入 -->
                <div class="input-section">
                    <div class="input-title">当前仓位</div>
                    
                    <!-- 输入框 -->
                    <div class="input-container">
                        <input type="number" id="currentPosition" class="position-input" 
                               placeholder="请输入当前仓位（%）" min="0" max="100" step="1">
                        <span class="input-suffix">%</span>
                    </div>
                    
                    <!-- 快捷按钮 -->
                    <div class="quick-buttons">
                        <button class="quick-btn" data-value="0">0%</button>
                        <button class="quick-btn" data-value="30">30%</button>
                        <button class="quick-btn" data-value="60">60%</button>
                        <button class="quick-btn" data-value="100">100%</button>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 建议仓位（只读） -->
                <div class="suggested-section">
                    <div class="suggested-title">建议仓位</div>
                    <div class="suggested-value" id="suggestedPosition">0%</div>
                    <div class="suggested-note">（来自 Market 页面）</div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 关键对比 -->
                <div class="comparison-section">
                    <div class="comparison-item">
                        <div class="comparison-label">当前仓位：</div>
                        <div class="comparison-value" id="displayCurrentPosition">--</div>
                    </div>
                    <div class="comparison-item">
                        <div class="comparison-label">建议仓位：</div>
                        <div class="comparison-value" id="displaySuggestedPosition">0%</div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 账户状态 -->
                <div class="account-status-section">
                    <div class="status-label">账户状态：</div>
                    <div class="status-value" id="accountStatus">--</div>
                </div>
                
                <!-- 操作建议 -->
                <div class="action-suggestion-section">
                    <div class="suggestion-label">操作建议：</div>
                    <div class="suggestion-text" id="actionSuggestion">请输入当前仓位</div>
                </div>
                
            </div>
            
        </div>
    </div>
    
    <script>
        // 纪律检查系统
        let suggestedPosition = 0; // 默认建议仓位，应从Market页面获取
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 隐藏加载指示器
            document.querySelector('.loading-indicator').style.display = 'none';
            document.querySelector('.position-info').textContent = '纪律检查系统就绪';
            
            // 设置建议仓位（这里应该从Market页面获取，暂时使用默认值）
            updateSuggestedPosition();
            
            // 添加快捷按钮事件
            document.querySelectorAll('.quick-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const value = this.getAttribute('data-value');
                    document.getElementById('currentPosition').value = value;
                    checkDiscipline();
                });
            });
            
            // 添加输入框事件
            const input = document.getElementById('currentPosition');
            input.addEventListener('input', checkDiscipline);
            input.addEventListener('change', checkDiscipline);
            
            // 初始检查
            checkDiscipline();
        });
        
        // 更新建议仓位（应从Market页面API获取）
        function updateSuggestedPosition() {
            // 这里应该调用Market页面的API获取建议仓位
            // 暂时使用示例值：0%（禁止交易）、30%（可以交易）、60%（积极做多）
            suggestedPosition = 0; // 默认禁止交易
            
            // 更新显示
            document.getElementById('suggestedPosition').textContent = suggestedPosition + '%';
            document.getElementById('displaySuggestedPosition').textContent = suggestedPosition + '%';
        }
        
        // 纪律检查核心逻辑
        function checkDiscipline() {
            const currentPositionInput = document.getElementById('currentPosition');
            const currentPosition = parseFloat(currentPositionInput.value) || 0;
            
            // 更新显示
            document.getElementById('displayCurrentPosition').textContent = currentPosition + '%';
            
            // 计算差值
            const difference = currentPosition - suggestedPosition;
            
            // 确定状态
            let status = 'normal';
            let statusText = '正常';
            let statusClass = 'status-normal';
            let suggestionText = '允许持有<br>仅在信号出现时加仓';
            
            if (currentPosition > suggestedPosition) {
                if (difference <= 30) {
                    status = 'deviate';
                    statusText = '偏离';
                    statusClass = 'status-deviate';
                    suggestionText = '停止加仓<br>等待信号确认';
                } else {
                    status = 'violation';
                    statusText = '违规';
                    statusClass = 'status-violation';
                    suggestionText = '减仓<br>避免扩大损失';
                }
            }
            
            // 更新状态显示
            const statusElement = document.getElementById('accountStatus');
            statusElement.textContent = statusText;
            statusElement.className = 'status-value ' + statusClass;
            
            // 更新操作建议
            document.getElementById('actionSuggestion').innerHTML = suggestionText;
            
            // 更新快捷按钮状态
            document.querySelectorAll('.quick-btn').forEach(button => {
                const value = parseFloat(button.getAttribute('data-value'));
                if (value === currentPosition) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
            
            // 记录检查结果
            console.log('纪律检查结果：');
            console.log(`当前仓位: ${currentPosition}%`);
            console.log(`建议仓位: ${suggestedPosition}%`);
            console.log(`差值: ${difference}%`);
            console.log(`状态: ${statusText}`);
            console.log(`操作建议: ${suggestionText.replace('<br>', ' ')}`);
        }
        
        // 模拟从Market页面获取建议仓位
        function fetchSuggestedPositionFromMarket() {
            // 这里应该调用Market页面的API
            // 示例：fetch('/api/market/suggested-position').then(...)
            
            // 暂时返回示例值
            return new Promise(resolve => {
                setTimeout(() => {
                    // 模拟三种状态：0%（禁止交易）、30%（可以交易）、60%（积极做多）
                    const states = [0, 30, 60];
                    const randomState = states[Math.floor(Math.random() * states.length)];
                    resolve(randomState);
                }, 500);
            });
        }
        
        // 如果需要从Market页面动态获取建议仓位，可以调用这个函数
        async function updateSuggestedPositionFromAPI() {
            try {
                const position = await fetchSuggestedPositionFromMarket();
                suggestedPosition = position;
                updateSuggestedPosition();
                checkDiscipline();
            } catch (error) {
                console.error('获取建议仓位失败:', error);
            }
        }
        
        // 页面加载时可以从API获取建议仓位（取消注释以下行）
        // updateSuggestedPositionFromAPI();
    </script>
</body>
</html>
