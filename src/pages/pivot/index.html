<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观 - Pivot</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <img src="/assets/icons/logo-optimized.png" alt="止观" class="brand-logo">
                <div class="brand-text">止观</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item" onclick="window.location.href='/market'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/leaders'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/account'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - 行为决策系统 -->
        <div class="main-content">
            <!-- 移动端菜单切换按钮 -->
            <button class="menu-toggle" id="menuToggle">
                <svg class="menu-toggle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 标题 -->
                <h1 class="page-title">PIVOT</h1>
                
                <!-- 状态区 -->
                <div class="status-section">
                    <p class="position-info">正在获取Pivot数据</p>
                    <div class="loading-indicator">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
                
                <!-- 判断语句 -->
                <div class="judgment-section">
                    <div class="judgment-text">今日是否存在可交易机会？</div>
                    <div class="judgment-result">❌ 当前：没有有效 Pivot</div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 为什么 -->
                <div class="reason-section">
                    <div class="reason-title">为什么？</div>
                    <div class="reason-points">
                        • 没有形成清晰的平台结构<br>
                        • 没有接近突破的位置<br>
                        • 没有量能配合
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 操作 -->
                <div class="action-section">
                    <div class="action-title">操作：</div>
                    <div class="action-command">继续等待</div>
                </div>
                
            </div>
            
        </div>
    </div>
    
    <script>
        // Pivot页面三种状态
        const pivotStates = [
            {
                // 状态1: 没有机会
                positionInfo: 'Pivot分析完成',
                judgmentText: '今日是否存在可交易机会？',
                judgmentResult: '❌ 当前：没有有效 Pivot',
                reasonTitle: '为什么？',
                reasonPoints: [
                    '没有形成清晰的平台结构',
                    '没有接近突破的位置',
                    '没有量能配合'
                ],
                actionTitle: '操作：',
                actionCommand: '继续等待'
            },
            {
                // 状态2: 观察机会
                positionInfo: '发现观察机会',
                judgmentText: '今日出现可观察机会',
                judgmentResult: '',
                reasonTitle: '标的：宁德时代',
                reasonPoints: [
                    '状态：接近突破',
                    '距离 Pivot：-1.2%'
                ],
                actionTitle: '操作：',
                actionCommand: '加入观察<br>暂不买入'
            },
            {
                // 状态3: 交易机会
                positionInfo: '发现交易机会',
                judgmentText: '出现可交易机会',
                judgmentResult: '',
                reasonTitle: '标的：贵州茅台',
                reasonPoints: [
                    '状态：突破成立',
                    '位置：Pivot 上方'
                ],
                actionTitle: '操作：',
                actionCommand: '允许试仓（1/9）'
            }
        ];

        // 模拟加载数据
        setTimeout(() => {
            document.querySelector('.loading-indicator').style.display = 'none';
            
            // 默认显示状态1（没有机会）
            const state = pivotStates[0];
            
            // 更新UI
            document.querySelector('.position-info').textContent = state.positionInfo;
            document.querySelector('.judgment-text').textContent = state.judgmentText;
            document.querySelector('.judgment-result').textContent = state.judgmentResult;
            document.querySelector('.reason-title').textContent = state.reasonTitle;
            document.querySelector('.reason-points').innerHTML = state.reasonPoints.map(point => `• ${point}`).join('<br>');
            document.querySelector('.action-title').textContent = state.actionTitle;
            
            // 处理操作命令（可能包含换行）
            const commandParts = state.actionCommand.split('<br>');
            if (commandParts.length > 1) {
                document.querySelector('.action-command').innerHTML = commandParts.join('<br>');
            } else {
                document.querySelector('.action-command').textContent = state.actionCommand;
            }
            
            console.log('Pivot页面加载完成，状态：没有有效机会');
        }, 1500);
        
        // 移动端菜单切换功能
        initMobileMenu();
        
        function initMobileMenu() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('mobile-visible');
                    
                    // 切换菜单图标
                    const icon = menuToggle.querySelector('.menu-toggle-icon');
                    if (sidebar.classList.contains('mobile-visible')) {
                        // 显示关闭图标
                        icon.innerHTML = '<path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    } else {
                        // 显示汉堡菜单图标
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏外部关闭菜单
                document.addEventListener('click', function(event) {
                    if (sidebar.classList.contains('mobile-visible') && 
                        !sidebar.contains(event.target) && 
                        !menuToggle.contains(event.target)) {
                        sidebar.classList.remove('mobile-visible');
                        const icon = menuToggle.querySelector('.menu-toggle-icon');
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏菜单项后关闭菜单（移动端）
                const menuItems = sidebar.querySelectorAll('.menu-item');
                menuItems.forEach(item => {
                    item.addEventListener('click', function() {
                        if (window.innerWidth <= 768) {
                            sidebar.classList.remove('mobile-visible');
                            const icon = menuToggle.querySelector('.menu-toggle-icon');
                            icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                        }
                    });
                });
                
                console.log('移动端菜单切换功能已启用');
            }
        }
    </script>
</body>
</html>
