<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>止观 - Pivot</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <!-- 允许必要的JavaScript执行 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                 <img src="/assets/icons/logo-optimized.png" alt="止观" class="brand-logo" loading="lazy" width="40" height="40">
                <div class="brand-text">止观</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item" onclick="window.location.href='/market'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/leaders'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item" onclick="window.location.href='/account'">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
                
                <!-- 反馈按钮 -->
                <button class="menu-item feedback-button" onclick="showFeedback()">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 17.5C14.1421 17.5 17.5 14.1421 17.5 10C17.5 5.85786 14.1421 2.5 10 2.5C5.85786 2.5 2.5 5.85786 2.5 10C2.5 11.422 2.915 12.75 3.634 13.865L2.5 17.5L6.135 16.366C7.25 17.085 8.578 17.5 10 17.5Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>反馈</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - 行为决策系统 -->
        <div class="main-content">
            <!-- 移动端菜单切换按钮 -->
            <button class="menu-toggle" id="menuToggle">
                <svg class="menu-toggle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 标题 -->
                <h1 class="page-title">PIVOT</h1>
                
                <!-- 日期信息 -->
                <div class="date-info">
                    正在获取市场数据...
                </div>
                
                <!-- 状态区 -->
                <div class="status-section">
                    <p class="position-info">建议仓位：≤100%</p>
                    <div class="loading-indicator" style="display: none;">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
                </div>
                
                <!-- 行动按钮 -->
                <button class="action-button action-green">状态：可尝试</button>
                
                <!-- 判断语句 -->
                <div class="judgment-section">
                    <div class="judgment-text">当前市场：全力做多</div>
                    <div class="judgment-result" style="color: #34c759; font-weight: 600;">发现2个年度突破买入点</div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 为什么 -->
                <div class="reason-section">
                    <div class="reason-title">执行理由</div>
                    <div class="reason-points">
                        <div class="reason-point">• 新易盛：突破250日高点，60日新高确认</div>
                        <div class="reason-point">• 立讯精密：站稳MA5，接近年度高点</div>
                        <div class="reason-point">• 换手率>5%，资金共识强烈</div>
                        <div class="reason-point">• 市场广度健康，上涨股票占比75%+</div>
                        <div style="font-weight: 700; color: #34c759; margin-top: 12px; border-top: 2px solid #f0f0f0; padding-top: 12px;">
                            命令：优先关注年度突破标的
                        </div>
                    </div>
                </div>
                
                <!-- 分隔线 -->
                <div class="divider"></div>
                
                <!-- 操作 -->
                <div class="action-section">
                    <div class="action-title">系统：</div>
                    <div class="action-command" style="color: #8e8e93;">止观 · 交易系统</div>
                </div>
                
            </div>
            
        </div>
    </div>
    
    <script>
        // Pivot页面三种状态
        const pivotStates = [
            {
                // 状态1: 没有机会
                positionInfo: 'Pivot分析完成',
                judgmentText: '今日是否存在可交易机会？',
                judgmentResult: '❌ 当前：没有有效 Pivot',
                reasonTitle: '为什么？',
                reasonPoints: [
                    '没有形成清晰的平台结构',
                    '没有接近突破的位置',
                    '没有量能配合'
                ],
                actionTitle: '操作：',
                actionCommand: '继续等待'
            },
            {
                // 状态2: 观察机会
                positionInfo: '发现观察机会',
                judgmentText: '今日出现可观察机会',
                judgmentResult: '',
                reasonTitle: '标的：宁德时代',
                reasonPoints: [
                    '状态：接近突破',
                    '距离 Pivot：-1.2%'
                ],
                actionTitle: '操作：',
                actionCommand: '加入观察<br>暂不买入'
            },
            {
                // 状态3: 交易机会
                positionInfo: '发现交易机会',
                judgmentText: '出现可交易机会',
                judgmentResult: '',
                reasonTitle: '标的：贵州茅台',
                reasonPoints: [
                    '状态：突破成立',
                    '位置：Pivot 上方'
                ],
                actionTitle: '操作：',
                actionCommand: '允许试仓（1/9）'
            }
        ];

        // 模拟加载数据
        setTimeout(() => {
            document.querySelector('.loading-indicator').style.display = 'none';
            
            // 默认显示状态1（没有机会）
            const state = pivotStates[0];
            
            // 更新UI
            document.querySelector('.position-info').textContent = state.positionInfo;
            document.querySelector('.judgment-text').textContent = state.judgmentText;
            document.querySelector('.judgment-result').textContent = state.judgmentResult;
            document.querySelector('.reason-title').textContent = state.reasonTitle;
            document.querySelector('.reason-points').innerHTML = state.reasonPoints.map(point => `• ${point}`).join('<br>');
            document.querySelector('.action-title').textContent = state.actionTitle;
            
            // 处理操作命令（可能包含换行）
            const commandParts = state.actionCommand.split('<br>');
            if (commandParts.length > 1) {
                document.querySelector('.action-command').innerHTML = commandParts.join('<br>');
            } else {
                document.querySelector('.action-command').textContent = state.actionCommand;
            }
            
            console.log('Pivot页面加载完成，状态：没有有效机会');
        }, 1500);
        
        // 移动端菜单切换功能
        initMobileMenu();
        
        function initMobileMenu() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('mobile-visible');
                    
                    // 切换菜单图标
                    const icon = menuToggle.querySelector('.menu-toggle-icon');
                    if (sidebar.classList.contains('mobile-visible')) {
                        // 显示关闭图标
                        icon.innerHTML = '<path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    } else {
                        // 显示汉堡菜单图标
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏外部关闭菜单
                document.addEventListener('click', function(event) {
                    if (sidebar.classList.contains('mobile-visible') && 
                        !sidebar.contains(event.target) && 
                        !menuToggle.contains(event.target)) {
                        sidebar.classList.remove('mobile-visible');
                        const icon = menuToggle.querySelector('.menu-toggle-icon');
                        icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    }
                });
                
                // 点击侧边栏菜单项后关闭菜单（移动端）
                const menuItems = sidebar.querySelectorAll('.menu-item');
                menuItems.forEach(item => {
                    item.addEventListener('click', function() {
                        if (window.innerWidth <= 768) {
                            sidebar.classList.remove('mobile-visible');
                            const icon = menuToggle.querySelector('.menu-toggle-icon');
                            icon.innerHTML = '<path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                        }
                    });
                });
                
                console.log('移动端菜单切换功能已启用');
            }
        }
        
        // 交易哲学格言（加载时随机显示）
        const tradingPhilosophyQuotes = [
            "价格包含一切",
            "市场不解释，只给结果",
            "没有信号，就是信号",
            "等待，是交易的一部分",
            "不是所有上涨，都属于你",
            "机会出现之前，什么都不做",
            "行动必须基于确认，而不是预期",
            "强者恒强，弱者更弱",
            "错误不可避免，失控可以避免",
            "先活下来，再谈盈利"
        ];

        // 显示随机交易哲学格言
        function showRandomPhilosophyQuote() {
            // 随机选择一条格言
            const randomIndex = Math.floor(Math.random() * tradingPhilosophyQuotes.length);
            const quote = tradingPhilosophyQuotes[randomIndex];
            
            // 随机选择另一条格言（确保不同）
            let secondQuote;
            do {
                const secondIndex = Math.floor(Math.random() * tradingPhilosophyQuotes.length);
                secondQuote = tradingPhilosophyQuotes[secondIndex];
            } while (secondQuote === quote && tradingPhilosophyQuotes.length > 1);
            
            // 更新显示
            const judgmentResult = document.querySelector('.judgment-result');
            const reasonPoints = document.querySelector('.reason-points');
            
            if (judgmentResult) judgmentResult.textContent = quote;
            if (reasonPoints) reasonPoints.innerHTML = secondQuote;
            
            console.log('Pivot页面显示交易哲学格言:', quote, '|', secondQuote);
        }

        // 三种交易状态（与Market页面保持一致）
        const tradingStates = [
            {
                position: "0%",
                buttonText: "禁止交易（WAIT）",
                buttonClass: "action-red",
                pageTitle: "JUST WAIT",
                executionReason: {
                    title: "为什么今天不交易？",
                    bulletPoints: [
                        "市场没有形成一致方向",
                        "没有确认的强势突破",
                        "条件尚未满足"
                    ],
                    command: "今天的任务：<br>不交易，保持耐心"
                },
                pivotJudgment: "❌ 当前：没有有效 Pivot",
                pivotReason: "• 没有形成清晰的平台结构<br>• 没有接近突破的位置<br>• 没有量能配合"
            },
            {
                position: "≤30%",
                buttonText: "准备阶段（READY）",
                buttonClass: "action-yellow",
                pageTitle: "ACT",
                executionReason: {
                    title: "为什么暂时不交易？",
                    bulletPoints: [
                        "市场开始分化",
                        "有潜在强势股票出现",
                        "但尚未确认突破"
                    ],
                    command: "今天的任务：<br>只观察，不出手"
                },
                pivotJudgment: "⚠️ 当前：存在潜在 Pivot",
                pivotReason: "• 开始形成平台结构<br>• 部分股票接近突破位置<br>• 需要等待确认信号"
            },
            {
                position: "≤100%",
                buttonText: "允许交易（CONFIRMED）",
                buttonClass: "action-green",
                pageTitle: "ACT",
                executionReason: {
                    title: "为什么今天允许交易？",
                    bulletPoints: [
                        "市场方向开始明确",
                        "出现确认突破的强势股票",
                        "系统条件已满足"
                    ],
                    command: "今天的任务：<br>只做确认后的最强股票"
                },
                pivotJudgment: "✅ 当前：存在确认 Pivot",
                pivotReason: "• 形成清晰的平台结构<br>• 股票确认突破位置<br>• 量能配合良好"
            }
        ];

        // 获取DOM元素
        const pageTitle = document.querySelector('.page-title');
        const positionInfo = document.querySelector('.position-info');
        const judgmentResult = document.querySelector('.judgment-result');
        const reasonPoints = document.querySelector('.reason-points');
        const dateInfo = document.querySelector('.date-info');
        const actionButton = document.querySelector('.action-button');

        // 初始化状态
        let currentStateIndex = 0;

        // 更新日期信息函数（与Market页面相同）
        function updateDateInfo() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const dayOfWeek = now.getDay();
            
            // 获取今天的日期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dateString = `${year}-${month}-${day}`;
            
            // 判断是否交易日（周一至周五）
            const isTradingDay = dayOfWeek >= 1 && dayOfWeek <= 5;
            
            let statusText = '';
            
            if (!isTradingDay) {
                // 非交易日（周末）
                let lastTradingDay = new Date(now);
                if (dayOfWeek === 0) { // 周日
                    lastTradingDay.setDate(now.getDate() - 2); // 回退到周五
                } else if (dayOfWeek === 6) { // 周六
                    lastTradingDay.setDate(now.getDate() - 1); // 回退到周五
                }
                const lastYear = lastTradingDay.getFullYear();
                const lastMonth = String(lastTradingDay.getMonth() + 1).padStart(2, '0');
                const lastDay = String(lastTradingDay.getDate()).padStart(2, '0');
                statusText = '今日判断（' + lastYear + '-' + lastMonth + '-' + lastDay + ' 已收盘）';
            } else {
                // 交易日（周一至周五）
                const currentTime = currentHour * 100 + currentMinute;
                
                if (currentTime < 900) {
                    // 9:00前
                    statusText = '今日判断（' + dateString + ' 等待开盘）';
                } else if (currentTime >= 900 && currentTime < 930) {
                    // 9:00-9:30 开盘前
                    statusText = '今日判断（' + dateString + ' 等待开盘）';
                } else if ((currentTime >= 930 && currentTime < 1130) || 
                           (currentTime >= 1300 && currentTime < 1500)) {
                    // 交易时间 9:30-11:30, 13:00-15:00
                    statusText = '今日判断（' + dateString + '）';
                } else if (currentTime >= 1130 && currentTime < 1300) {
                    // 午休时间 11:30-13:00
                    statusText = '今日判断（' + dateString + ' 午间休市）';
                } else {
                    // 15:00后 已收盘
                    statusText = '今日判断（' + dateString + ' 已收盘）';
                }
            }
            
            if (dateInfo) {
                dateInfo.textContent = statusText;
                console.log(`Pivot日期信息已更新: ${statusText}`);
            }
        }

        // 更新UI函数
        function updateUI(stateIndex) {
            const state = tradingStates[stateIndex];
            
            // 更新页面标题
            if (pageTitle) {
                pageTitle.textContent = state.pageTitle;
            }
            
            // 更新仓位信息
            if (positionInfo) {
                positionInfo.textContent = `建议仓位：${state.position}`;
            }
            
            // 更新Pivot判断
            if (judgmentResult) {
                judgmentResult.textContent = state.pivotJudgment;
            }
            
            // 更新原因
            if (reasonPoints) {
                reasonPoints.innerHTML = state.pivotReason;
            }
            
            // 更新行动按钮
            if (actionButton) {
                actionButton.textContent = state.buttonText;
                actionButton.className = `action-button ${state.buttonClass}`;
            }
            
            // 隐藏加载指示器
            const loadingIndicator = document.querySelector('.loading-indicator');
            if (loadingIndicator) {
                loadingIndicator.style.display = 'none';
            }
            
            console.log('Pivot页面UI更新完成，状态索引:', stateIndex);
        }

        // 从后端获取实时数据
        async function fetchMarketData() {
            try {
                // 更新日期信息
                updateDateInfo();
                
                console.log('正在获取市场数据...');
                const apiUrl = '/api/market/overview';
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('API响应:', result);
                
                if (result.success && result.signal) {
                    const signal = result.signal.trade_signal;
                    console.log('交易信号:', signal);
                    
                    // 根据后端信号决定状态
                    if (signal === "禁止交易") {
                        currentStateIndex = 0;
                    } else if (signal === "允许交易" || signal === "可以交易") {
                        currentStateIndex = 1;
                    } else if (signal === "积极交易" || signal === "积极做多") {
                        currentStateIndex = 2;
                    } else {
                        console.log('未知信号，使用默认状态');
                        currentStateIndex = 0;
                    }
                    
                    updateUI(currentStateIndex);
                    console.log('Pivot页面已根据市场信号更新');
                } else {
                    console.log('API响应格式错误，使用默认状态');
                    updateUI(currentStateIndex);
                }
            } catch (error) {
                console.error('获取市场数据失败:', error);
                console.log('使用默认状态');
                updateUI(currentStateIndex);
            }
        }

        // 行动按钮点击事件
        if (actionButton) {
            actionButton.addEventListener('click', function() {
                const state = tradingStates[currentStateIndex];
                const reasonText = `${state.executionReason.title}\n\n${state.executionReason.bulletPoints.map(point => `• ${point}`).join('\n')}\n\n${state.executionReason.command}`;
                alert(`交易决策：${state.buttonText}\n建议仓位：${state.position}\n\n${reasonText}\n\n决策基于实时市场数据，不可手动更改。`);
            });
        }

        // 页面初始化 - 在DOM加载完成后执行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                console.log('Pivot页面: DOM已完全加载，开始初始化');
                showRandomPhilosophyQuote();
                fetchMarketData();
            });
        } else {
            // DOM已经加载完成
            console.log('Pivot页面: DOM已加载完成，开始初始化');
            showRandomPhilosophyQuote();
            fetchMarketData();
        }

        // 反馈功能
        function showFeedback() {
            const feedbackText = prompt('感谢使用止观系统！\n\n请告诉我们您的反馈或建议：\n\n1. 系统是否帮助您减少了不必要的交易？\n2. 您希望看到哪些改进？\n3. 其他建议？', '');
            
            if (feedbackText && feedbackText.trim()) {
                alert('感谢您的反馈！\n\n您的意见对我们非常重要。\n\n反馈已记录，我们会持续改进系统。');
                console.log('用户反馈:', feedbackText);
                
                // 这里可以添加将反馈发送到后端的代码
                // sendFeedbackToBackend(feedbackText);
            } else if (feedbackText !== null) {
                alert('反馈内容不能为空。');
            }
        }
        
        // 添加反馈按钮事件监听
        const feedbackButton = document.querySelector('.feedback-button');
        if (feedbackButton) {
            feedbackButton.addEventListener('click', showFeedback);
        }
    </script>
</body>
</html>
