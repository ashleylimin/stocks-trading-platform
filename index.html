<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/market">
    <title>止观 - 重定向中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .redirect-container {
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #1d1d1f;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #666;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }
        .link {
            display: inline-block;
            padding: 12px 24px;
            background: #007AFF;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
        }
        .link:hover {
            background: #0056CC;
        }
        .loading {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo">止观</div>
        <h1>交易决策系统</h1>
        <p>正在重定向到止观交易决策系统...</p>
        <p>如果页面没有自动跳转，请 <a href="/market" class="link">点击这里</a>。</p>
        <div class="loading">⏳ 正在加载...</div>
    </div>
    
    <script>
        // 3秒后自动跳转
        setTimeout(function() {
            window.location.href = '/market';
        }, 3000);
    </script>
</body>
</html>
