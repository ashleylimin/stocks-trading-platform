<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>止观</title>
    
    <style>
        /* 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 系统字体 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff; 
            color: #333333;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 应用布局 */
        .app { 
            display: flex; 
            flex: 1;
        }
        
        /* 侧边栏 - 极简 */
        .sidebar {
            width: 200px;
            background: #ffffff;
            border-right: 1px solid #f0f0f0;
            padding: 24px 16px;
            position: fixed;
            height: 100vh;
        }
        
        .sidebar-brand {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
        }
        
        .brand-logo {
            width: 60px;
            height: 60px;
            display: block;
            margin: 0 auto 12px auto;
        }
        
        .brand-name {
            font-size: 20px;
            font-weight: 600;
            color: #333333;
        }
        
        .brand-text {
            font-size: 16px;
            font-weight: 500;
            color: #666666;
            margin-top: 8px;
        }
        
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #666666;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
        }
        
        .menu-item:hover {
            background: #f8f9fa;
            color: #333333;
        }
        
        .menu-item.active {
            background: #f0f7ff;
            color: #007bff;
            font-weight: 600;
        }
        
        .menu-icon {
            width: 20px;
            height: 20px;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: 200px;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* 顶部标题 */
        .page-header {
            padding: 40px 40px 20px;
            text-align: center;
        }
        
        .page-title {
            font-size: 48px;
            font-weight: 800;
            color: #333333;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        
        /* 核心决策区 - 垂直居中，适配高度 */
        .decision-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            min-height: calc(100vh - 80px);
        }
        
        /* 状态区 */
        .status-section {
            width: 100%;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .status-red {
            color: #dc2626;
        }
        
        .status-yellow {
            color: #f59e0b;
        }
        
        .status-green {
            color: #10b981;
        }
        
        .loading-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #666;
            animation: loading-bounce 1.4s infinite ease-in-out both;
        }
        
        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes loading-bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .status-green {
            color: #10b981;
        }
        
        .position-info {
            font-size: 18px;
            font-weight: 600;
            color: #666;
            margin-bottom: 4px;
        }
        
        /* 行动按钮 */
        .action-button {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        
        .action-red {
            background: #dc2626;
            color: white;
        }
        
        .action-yellow {
            background: #d97706;
            color: white;
        }
        
        .action-green {
            background: #10b981;
            color: white;
        }
        
        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        /* 原因列表 */
        .reasons-section {
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .reason-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .reason-bullet {
            color: #666;
            margin-right: 12px;
            font-weight: 600;
        }
        
        /* 操作指令 */
        .instructions-section {
            width: 100%;
            max-width: 400px;
            margin-bottom: 40px;
        }
        
        .instruction-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f0f7ff;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 16px;
            color: #007bff;
            font-weight: 600;
        }
        
        .instruction-bullet {
            margin-right: 12px;
        }
        
        /* 决策依据 */
        .decision-basis {
            width: 100%;
            max-width: 400px;
            margin-top: 8px;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
        }
        
        .basis-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .basis-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #e9ecef;
            font-size: 14px;
        }
        
        .basis-item:last-child {
            border-bottom: none;
        }
        
        .basis-label {
            color: #666;
            font-weight: 500;
        }
        
        .basis-value {
            color: #333;
            font-weight: 600;
        }
        
        .basis-true {
            color: #10b981;
        }
        
        .basis-false {
            color: #dc2626;
        }
        
        /* 底部固定文案 */
        .footer-text {
            text-align: center;
            color: #666;
            font-size: 16px;
            font-weight: 600;
            padding: 24px 40px;
            border-top: 1px solid #f0f0f0;
            background: #ffffff;
        }
        

        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .page-header {
                padding: 30px 20px 15px;
            }
            
            .page-title {
                font-size: 36px;
            }
            
            .decision-container {
                padding: 0 20px;
                min-height: calc(100vh - 60px);
            }
            
            .action-button {
                font-size: 18px;
                padding: 16px;
                margin-top: 6px;
                margin-bottom: 16px;
            }
            
            .decision-basis {
                padding: 12px;
                margin-top: 6px;
            }
            
            .basis-title {
                font-size: 14px;
                margin-bottom: 6px;
            }
            
            .basis-item {
                font-size: 12px;
                padding: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 - 正确版本 -->
        <div class="sidebar">
            <div class="sidebar-brand">
                 <img src="assets/icons/logo.png" alt="止观" class="brand-logo">
                <div class="brand-text">止观 [TEST]</div>
            </div>
            
            <div class="sidebar-menu">
                <button class="menu-item active">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 17.1667V2.16669M4 17.1667V13.4167M9.5 17.1667V7.79169" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Market</span>
                </button>
                <button class="menu-item">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 17L17 4M17 4L9.5 4M17 4V11.5M2 14H14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Pivot</span>
                </button>
                <button class="menu-item">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5.33333 16V3M5.33333 3L2 6.25M5.33333 3L8.66667 6.25M13.6667 16V7.0625M13.6667 7.0625L10.3333 10.3125M13.6667 7.0625L17 10.3125" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Leaders</span>
                </button>
                <button class="menu-item">
                    <svg class="menu-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.73517 17.8333V9.89214M9.73517 9.89214L15.4706 2.83331M9.73517 9.89214L4 2.83331M15.0293 9.89214H4.44105M14.1469 13.4215H5.32341" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Account</span>
                </button>
            </div>
        </div>
        
        <!-- 主内容区 - UI重构版本 -->
        <div class="main-content">
            <!-- 顶部标题 -->
            <div class="page-header">
                <h1 class="page-title">JUST WAIT [TEST]</h1>
            </div>
            
            <!-- 核心决策区 -->
            <div class="decision-container">
                <!-- 状态区 -->
            <div class="status-section">
                <p class="position-info">正在获取市场数据</p>
                <div class="loading-indicator">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            </div>
                
                <!-- 行动按钮 -->
                <button class="action-button action-red">今日禁止交易</button>
                
                <!-- 实际决策依据 -->
                <div class="decision-basis">
                    <div class="basis-title">决策依据</div>
                    <div class="basis-item">
                        <span class="basis-label">市场广度：</span>
                        <span class="basis-value">上涨23.4% / 下跌76.6%</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">52周高低比：</span>
                        <span class="basis-value">21.8% (292/1340)</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">趋势条件：</span>
                        <span class="basis-value basis-false">未满足</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">广度条件：</span>
                        <span class="basis-value basis-false">未满足</span>
                    </div>
                    <div class="basis-item">
                        <span class="basis-label">板块条件：</span>
                        <span class="basis-value basis-true">已满足</span>
                    </div>
                </div>
                

            </div>
            

        </div>
    </div>

    <script>
        // 模拟三种交易状态
        const tradingStates = [
            {
                position: "0%",
                buttonText: "今日禁止交易",
                buttonClass: "action-red",
                pageTitle: "JUST WAIT"
            },
            {
                position: "≤30%",
                buttonText: "今日可以交易",
                buttonClass: "action-yellow",
                pageTitle: "ACT"
            },
            {
                position: "≤100%",
                buttonText: "今日积极做多",
                buttonClass: "action-green",
                pageTitle: "ACT"
            }
        ];

        // 获取DOM元素
        const pageTitle = document.querySelector('.page-title');
        const positionInfo = document.querySelector('.position-info');
        const actionButton = document.querySelector('.action-button');

        // 初始化状态
        let currentStateIndex = 0;

        // 更新UI函数
        function updateUI(stateIndex) {
            const state = tradingStates[stateIndex];
            
            // 更新页面标题
            pageTitle.textContent = state.pageTitle;
            
            // 更新仓位信息
            positionInfo.textContent = `建议仓位：${state.position}`;
            
            // 隐藏加载指示器
            const loadingIndicator = document.querySelector('.loading-indicator');
            if (loadingIndicator) {
                loadingIndicator.style.display = 'none';
            }
            
            // 更新按钮
            actionButton.textContent = state.buttonText;
            actionButton.className = `action-button ${state.buttonClass}`;
            
            console.log('UI更新完成');
        }

        // 按钮点击显示详细信息（不再切换状态）
        actionButton.addEventListener('click', function() {
            // 不再切换状态，只显示当前状态的详细信息
            alert(`交易决策：${tradingStates[currentStateIndex].buttonText}\n建议仓位：${tradingStates[currentStateIndex].position}\n\n决策基于实时市场数据，不可手动更改。`);
        });

        // 显示加载状态
        console.log('页面初始化，显示加载状态');
        
        // 从后端获取实时数据（页面加载后立即执行）
        async function fetchMarketData() {
            try {
                console.log('正在获取市场数据...');
                const apiUrl = 'https://stocks-trading-platform-production.up.railway.app/api/market/overview';
                console.log('API URL:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                console.log('响应状态:', response.status, response.statusText);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('API响应:', result);
                
                if (result.success && result.signal) {
                    const signal = result.signal.trade_signal;
                    console.log('交易信号:', signal);
                    
                    // 根据后端信号决定状态
                    if (signal === "禁止交易") {
                        currentStateIndex = 0;
                    } else if (signal === "可以交易") {
                        currentStateIndex = 1;
                    } else if (signal === "积极做多") {
                        currentStateIndex = 2;
                    } else {
                        console.log('未知信号，使用默认状态');
                        currentStateIndex = 0; // 默认禁止交易
                    }
                    
                    // 更新决策依据
                    updateDecisionBasis(result);
                    
                    updateUI(currentStateIndex);
                    console.log('UI已更新，状态索引:', currentStateIndex);
                } else {
                    console.log('API响应格式错误，使用演示数据');
                }
            } catch (error) {
                console.error('获取数据失败:', error);
                console.log('错误详情:', error.message);
                
                // 尝试使用XMLHttpRequest作为fallback
                try {
                    console.log('尝试使用XMLHttpRequest...');
                    const xhrResult = await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('GET', 'https://stocks-trading-platform-production.up.railway.app/api/market/overview');
                        xhr.onload = () => {
                            if (xhr.status === 200) {
                                resolve(JSON.parse(xhr.responseText));
                            } else {
                                reject(new Error(`XHR错误: ${xhr.status}`));
                            }
                        };
                        xhr.onerror = () => reject(new Error('XHR网络错误'));
                        xhr.send();
                    });
                    
                    console.log('XHR成功:', xhrResult);
                    if (xhrResult.success && xhrResult.signal) {
                        const signal = xhrResult.signal.trade_signal;
                        if (signal === "禁止交易") currentStateIndex = 0;
                        else if (signal === "可以交易") currentStateIndex = 1;
                        else if (signal === "积极做多") currentStateIndex = 2;
                        
                        // 更新决策依据
                        updateDecisionBasis(xhrResult);
                        
                        updateUI(currentStateIndex);
                        return;
                    }
                } catch (xhrError) {
                    console.error('XHR也失败:', xhrError);
                }
                
                console.log('使用演示数据');
            }
        }
        
        // 更新决策依据函数
        function updateDecisionBasis(data) {
            const decisionBasis = document.querySelector('.decision-basis');
            if (!decisionBasis) return;
            
            // 获取数据
            const breadth = data.breadth || {};
            const signal = data.signal || {};
            
            // 更新市场广度
            const marketBreadthElement = document.querySelector('.basis-item:nth-child(2) .basis-value');
            if (marketBreadthElement && breadth.up_percentage !== undefined && breadth.down_percentage !== undefined) {
                marketBreadthElement.textContent = `上涨${breadth.up_percentage}% / 下跌${breadth.down_percentage}%`;
            }
            
            // 更新52周高低比
            const hlRatioElement = document.querySelector('.basis-item:nth-child(3) .basis-value');
            if (hlRatioElement && breadth.hl_ratio !== undefined && breadth.highs_52wk !== undefined && breadth.lows_52wk !== undefined) {
                const hlRatioPercent = (breadth.hl_ratio * 100).toFixed(1);
                hlRatioElement.textContent = `${hlRatioPercent}% (${breadth.highs_52wk}/${breadth.lows_52wk})`;
            }
            
            // 更新趋势条件
            const trendElement = document.querySelector('.basis-item:nth-child(4) .basis-value');
            if (trendElement && signal.condition1_trend !== undefined) {
                trendElement.textContent = signal.condition1_trend ? "已满足" : "未满足";
                trendElement.className = signal.condition1_trend ? "basis-value basis-true" : "basis-value basis-false";
            }
            
            // 更新广度条件
            const breadthElement = document.querySelector('.basis-item:nth-child(5) .basis-value');
            if (breadthElement && signal.condition2_breadth !== undefined) {
                breadthElement.textContent = signal.condition2_breadth ? "已满足" : "未满足";
                breadthElement.className = signal.condition2_breadth ? "basis-value basis-true" : "basis-value basis-false";
            }
            
            // 更新板块条件
            const sectorsElement = document.querySelector('.basis-item:nth-child(6) .basis-value');
            if (sectorsElement && signal.condition3_sectors !== undefined) {
                sectorsElement.textContent = signal.condition3_sectors ? "已满足" : "未满足";
                sectorsElement.className = signal.condition3_sectors ? "basis-value basis-true" : "basis-value basis-false";
            }
            
            console.log('决策依据已更新');
        }

        // 页面加载时获取数据
        fetchMarketData();
    </script>
</body>
</html>
